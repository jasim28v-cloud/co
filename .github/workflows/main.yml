name: إنشاء ونشر موقع فيتا

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 تحميل المستودع
        uses: actions/checkout@v4

      - name: 🐍 إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ تشغيل scraper.py لإنشاء ملفات الموقع
        run: python scraper.py

      - name: 📋 عرض الملفات المنشأة
        run: ls -la

      - name: 📤 رفع الملفات إلى المستودع
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "تحديث تلقائي لملفات فيتا"
          git push

      - name: 📄 إعداد GitHub Pages
        uses: actions/configure-pages@v4

      - name: 📦 تجهيز الموقع للنشر
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 نشر الموقع
        id: deployment
        uses: actions/deploy-pages@v4
