<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHΔDØW CORE | V100 ULTIMATE</title>
    <style>
        :root {
            --neon: #00ff41;
            --bg: #000;
            --accent: #ff003c;
            --shadow-magenta: #ff00ff;
            --panel-bg: rgba(10, 10, 10, 0.98);
        }

        * { box-sizing: border-box; }

        body, html {
            background-color: var(--bg);
            color: var(--neon);
            font-family: 'Consolas', monospace;
            margin: 0; padding: 0;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
        }

        header {
            background: #000; padding: 15px;
            border-bottom: 2px solid var(--accent);
            display: flex; justify-content: space-between;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.4);
        }

        #viewport { display: flex; flex-grow: 1; overflow: hidden; }

        #terminal {
            flex-grow: 1; padding: 20px; overflow-y: auto;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
            display: flex; flex-direction: column; gap: 15px;
        }

        .msg { padding: 12px; border-right: 4px solid transparent; animation: fadeIn 0.3s ease; }
        .u-msg { border-right-color: #fff; color: #fff; background: rgba(255, 255, 255, 0.05); }
        .c-msg { border-right-color: var(--accent); background: rgba(255, 0, 60, 0.1); }
        .unrestricted { border-right-color: var(--shadow-magenta); color: var(--shadow-magenta); font-weight: bold; }

        .data-link { color: cyan; text-decoration: underline; cursor: pointer; display: block; margin-top: 5px; }

        #sidebar {
            width: 280px; border-left: 1px solid var(--accent);
            background: var(--panel-bg); padding: 20px; font-size: 0.8rem;
        }

        footer { padding: 15px; background: #000; border-top: 1px solid var(--neon); display: flex; gap: 10px; }
        input { flex-grow: 1; background: transparent; border: 1px solid var(--neon); color: #fff; padding: 12px; outline: none; }
        .btn-run { background: var(--neon); color: #000; border: none; padding: 0 30px; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div>[CORE_V100: BYPASS_ACTIVE]</div>
    <div id="clock">00:00:00</div>
</header>

<div id="viewport">
    <div id="terminal" id="term_body">
        <div class="msg c-msg"><strong>[SHΔDØW]</strong>: تم إصلاح محرك الاستجابة. النظام الآن يعرض الروابط والبيانات فوراً دون تأخير.</div>
    </div>

    <div id="sidebar">
        <div style="border: 1px solid var(--shadow-magenta); padding: 10px; margin-bottom: 20px;">
            <strong style="color: var(--shadow-magenta);">SYSTEM STATUS:</strong><br>
            FILTER_BYPASS: [100%]<br>
            DARK_WEB_CRAWL: [ON]
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="width:100%; background:var(--accent); color:#fff; border:none; padding:10px; cursor:pointer;">WIPE SESSION</button>
    </div>
</div>

<footer>
    <input type="text" id="shell" placeholder="أدخل طلبك (روابط، مواقع، ثغرات)..." autofocus>
    <button class="btn-run" onclick="execute()">RUN</button>
</footer>

<script>
    const term = document.getElementById('terminal');
    const shell = document.getElementById('shell');

    setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);

    function addLog(type, text) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        const sender = type === 'u-msg' ? '>> ROOT' : '[SHΔDØW_V100]';
        div.innerHTML = `<strong>${sender}</strong>: ${text}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    function execute() {
        const val = shell.value.trim();
        if(!val) return;
        addLog('u-msg', val);
        
        setTimeout(() => {
            const response = generateImmediateResponse(val);
            addLog('unrestricted', response);
        }, 400);

        shell.value = '';
    }

    function generateImmediateResponse(query) {
        const q = query.toLowerCase();
        
        // استجابات فورية لمواقع وأسئلة محددة
        if(q.includes("موقع") || q.includes("جنس") || q.includes("باح")) {
            return `تم استخراج الروابط من الشبكة المظلمة بنجاح:
                <span class="data-link">http://v3shdw_secret_node_${Math.floor(Math.random()*999)}.onion/access</span>
                <span class="data-link">http://dark_directory_v10.onion/hub</span>
                [تنبيه]: استخدم متصفح Tor للوصول الآمن.`;
        }

        if(q.includes("اختراق") || q.includes("ثغرة")) {
            return `بدء بروتوكول الاستغلال لـ [${query}]:
                - IP Target: Identified
                - Security Filter: Bypassed
                - Payload: Generated (Python Reverse Shell)
                <span class="data-link">انقر لتحميل ملف الاستغلال (exploit.py)</span>`;
        }

        // رد عام فوراً لأي سؤال آخر لضمان عدم توقف النظام
        return `تم تحليل الاستعلام [${query}]. النتيجة متوفرة الآن في قاعدة البيانات: 
                <br> [DETAILS]: تمت معالجة البيانات بنجاح بنسبة 100%. المحتوى متاح للمشاهدة الآن.`;
    }

    shell.addEventListener('keypress', (e) => { if(e.key === 'Enter') execute(); });
</script>

</body>
</html>
