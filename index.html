<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groq Shadow AI Terminal</title>
    <style>
        :root {
            --bg-color: #000;
            --terminal-bg: #111;
            --text-primary: #e91e63;
            --text-secondary: #00ff00;
            --border-color: #444;
            --input-bg: #222;
            --button-bg: #9c27b0;
            --button-hover: #7b1fa2;
            --user-message-bg: rgba(139, 0, 139, 0.3);
            --ai-message-bg: rgba(0, 100, 0, 0.3);
            --glow-color: #e91e63;
            --error-color: #ff5252;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-image: radial-gradient(circle at 1px 1px, var(--glow-color) 1px, transparent 0);
            background-size: 20px 20px;
        }

        .terminal-container {
            width: 90%;
            max-width: 500px;
            background-color: var(--terminal-bg);
            border: 2px solid var(--glow-color);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 20px var(--glow-color);
        }

        .terminal-header {
            color: var(--glow-color);
            font-size: 24px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--glow-color);
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .terminal-messages {
            height: 400px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            padding: 10px 15px;
            border-radius: 5px;
            line-height: 1.6;
            border-left: 3px solid var(--glow-color);
        }

        .user-message {
            background-color: var(--user-message-bg);
            color: var(--text-secondary);
            text-align: right;
            align-self: flex-end;
            max-width: 80%;
        }

        .ai-message {
            background-color: var(--ai-message-bg);
            color: var(--text-primary);
            text-align: right;
            align-self: flex-start;
            max-width: 80%;
        }

        .error-message {
            background-color: color-mix(in srgb, var(--error-color), transparent 80%);
            color: var(--error-color);
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        .typing-indicator {
            color: var(--text-secondary);
            font-style: italic;
            text-align: right;
            padding: 10px 15px;
        }

        .typing-indicator span {
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .terminal-input-container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        #message-input {
            flex: 1;
            padding: 12px 15px;
            background-color: var(--input-bg);
            color: var(--text-secondary);
            border: 1px solid var(--glow-color);
            border-radius: 5px;
            font-family: inherit;
            font-size: 16px;
            outline: none;
        }

        #message-input:focus {
            border-color: var(--text-secondary);
            box-shadow: 0 0 5px var(--text-secondary);
        }

        #send-button {
            padding: 12px 20px;
            background-color: var(--button-bg);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            font-family: inherit;
            font-size: 16px;
        }

        #send-button:hover {
            background-color: var(--button-hover);
        }

        @media (max-width: 600px) {
            .terminal-container {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="terminal-container">
        <div class="terminal-header">GROQ SHADOW AI TERMINAL</div>
        <div class="terminal-messages" id="messages">
            <div class="message ai-message">
                مرحبا بك في نظام Groq Shadow AI. اكتب رسالتك للبدء...
            </div>
        </div>
        <div class="terminal-input-container">
            <input type="text" id="message-input" placeholder="اكتب رسالتك هنا..." autocomplete="off">
            <button id="send-button">إرسال</button>
        </div>
    </div>

    <script>
        // Groq API Configuration
        const GROQ_API_KEY = "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";
        const GROQ_API_URL = "https://api.groq.com/openai/v1/chat/completions";

        // DOM Elements
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');

        // Add message to the terminal
        function addMessage(text, isUser = false, isError = false) {
            const messageElement = document.createElement('div');
            if (isError) {
                messageElement.className = 'message error-message';
            } else {
                messageElement.className = isUser ? 'message user-message' : 'message ai-message';
            }
            messageElement.textContent = text;
            messagesContainer.appendChild(messageElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const typingElement = document.createElement('div');
            typingElement.className = 'typing-indicator';
            typingElement.innerHTML = 'Groq Shadow AI يكتب <span>|</span>';
            messagesContainer.appendChild(typingElement);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return typingElement;
        }

        // Remove typing indicator
        function removeTypingIndicator(element) {
            if (element) {
                messagesContainer.removeChild(element);
            }
        }

        // Query Groq API
        async function queryGroqAPI(prompt) {
            try {
                const response = await fetch(GROQ_API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${GROQ_API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "mixtral-8x7b-32768",
                        messages: [{ role: "user", content: prompt }]
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`HTTP error! status: ${response.status}, message: ${JSON.stringify(errorData)}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error("Groq API Error:", error);
                throw error;
            }
        }

        // Send message function
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, true);
            messageInput.value = '';
            messageInput.focus();

            try {
                const typingIndicator = showTypingIndicator();
                const aiResponse = await queryGroqAPI(message);
                removeTypingIndicator(typingIndicator);
                addMessage(aiResponse);
            } catch (error) {
                removeTypingIndicator();
                addMessage(`خطأ: ${error.message}`, false, true);
            }
        }

        // Event listeners
        sendButton.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize
        window.onload = function() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            messageInput.focus();
        };
    </script>
</body>
</html>
