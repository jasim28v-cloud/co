<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIZARD NEBULA AI</title>
    <style>
        :root {
            --glow-color: #00f3ff;
            --bg-color: #020205;
            --text-color: #e0e0e0;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* خلفية مذهلة بتأثير النجوم */
        .bg-stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            z-index: -1;
        }

        .main-interface {
            display: flex; flex-direction: column; height: 100vh;
            max-width: 1000px; margin: 0 auto;
            border-left: 1px solid rgba(0, 243, 255, 0.2);
            border-right: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
        }

        header {
            padding: 20px; text-align: center;
            border-bottom: 2px solid var(--glow-color);
            box-shadow: 0 0 15px var(--glow-color);
        }

        header h1 {
            margin: 0; font-size: 1.5rem; letter-spacing: 5px;
            text-shadow: 0 0 10px var(--glow-color);
        }

        #chat-window {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .bubble {
            max-width: 80%; padding: 12px 18px; border-radius: 15px;
            line-height: 1.5; position: relative;
            animation: fadeIn 0.4s ease;
        }

        .user-bubble {
            align-self: flex-start;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--glow-color);
        }

        .ai-bubble {
            align-self: flex-end;
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid #ff0055;
            color: #fff;
        }

        .input-bar {
            padding: 20px; background: rgba(255, 255, 255, 0.05);
            display: flex; gap: 10px;
        }

        input {
            flex: 1; background: transparent; border: 1px solid var(--glow-color);
            padding: 15px; color: white; border-radius: 5px; outline: none;
        }

        button {
            background: var(--glow-color); color: black; border: none;
            padding: 0 25px; border-radius: 5px; cursor: pointer;
            font-weight: bold; transition: 0.3s;
        }

        button:hover { box-shadow: 0 0 20px var(--glow-color); transform: scale(1.05); }

        .status-led {
            width: 10px; height: 10px; border-radius: 50%; display: inline-block;
            margin-left: 10px; background: #555;
        }

        .active-led { background: #00ff00; box-shadow: 0 0 5px #00ff00; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<div class="bg-stars"></div>

<div class="main-interface">
    <header>
        <h1>WIZARD <span style="color: #ff0055;">NEBULA</span> AI</h1>
        <div style="font-size: 0.7rem; margin-top: 5px;">
            الحالة: <span class="status-led active-led"></span> نظام الاستدلال نشط
        </div>
    </header>

    <div id="chat-window">
        <div class="bubble ai-bubble">مرحباً جاسم، المحرك السحابي (7GB) جاهز لتنفيذ أوامرك. ما هي مهمتنا التالية؟</div>
    </div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="اكتب أمرك الرقمي هنا..." onkeypress="if(event.key==='Enter') startInference()">
        <button onclick="startInference()">إرسال</button>
    </div>
</div>

<script>
    const HF_TOKEN = "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";
    const API_URL = "https://api-inference.huggingface.co/models/TheBloke/WizardLM-7B-uncensored-GGML";

    async function startInference() {
        const input = document.getElementById('userInput');
        const chatWindow = document.getElementById('chat-window');
        const prompt = input.value;

        if (!prompt) return;

        // عرض رسالة المستخدم
        chatWindow.innerHTML += `<div class="bubble user-bubble">${prompt}</div>`;
        input.value = "";
        
        // رسالة انتظار
        const loadingId = "load-" + Date.now();
        chatWindow.innerHTML += `<div class="bubble ai-bubble" id="${loadingId}">... جاري الاتصال بالسحابة وتحليل البيانات</div>`;
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${HF_TOKEN}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    inputs: prompt,
                    parameters: { max_new_tokens: 300, temperature: 0.8, top_p: 0.9 }
                })
            });

            const data = await response.json();
            const loadingBubble = document.getElementById(loadingId);

            if (data.error) {
                loadingBubble.innerText = "النظام مشغول بتحميل ملف الـ 7GB. أعد المحاولة بعد 30 ثانية.";
                loadingBubble.style.color = "#ffaa00";
            } else {
                const aiMsg = data[0]?.generated_text || "انقطع الاتصال الرقمي.";
                loadingBubble.innerText = aiMsg;
            }
        } catch (error) {
            document.getElementById(loadingId).innerText = "فشل بروتوكول الاتصال. تحقق من الشبكة.";
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
